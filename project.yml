name: VoiceRouter
options:
  bundleIdPrefix: com.voicerouter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  VoiceRouter:
    type: application
    platform: iOS
    sources:
      - VoiceRouter
    settings:
      base:
        DEVELOPMENT_TEAM: "6B2UA5WHD4"
        INFOPLIST_FILE: VoiceRouter/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.voicerouter.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
